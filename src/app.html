<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- PWA manifest + icons -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

		<!-- Address-bar tint on Android Chrome; iOS uses the apple-mobile-web-app-* tags below. -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

		<!-- iOS standalone mode + app title for "Add to Home Screen". -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Uni Chat" />

		<!-- Apply the persisted "Default Colors" choice before any content
		     paints, so light-mode users who opted out of the cream + yellow
		     palette don't see a flash of the custom theme on refresh. The
		     colors store does the same thing on import; this just runs first. -->
		<script>
			try {
				if (localStorage.getItem('unichat_use_default_colors') === 'true') {
					document.documentElement.classList.add('use-default-colors');
				}
			} catch (_) {}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
